# ── Namespace ────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: sample-app-2
  labels:
    app.kubernetes.io/managed-by: argocd
    project: devops-platform
    demo: canary-deployment

---
# ── Shared Service ───────────────────────────────────────────
# No changes needed here. It still selects 'app: sample-app-2'
apiVersion: v1
kind: Service
metadata:
  name: sample-app-2
  namespace: sample-app-2
spec:
  selector:
    app: sample-app-2
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP

---
# ── ConfigMap: Stable version HTML ───────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-app-2-stable-html
  namespace: sample-app-2
data:
  index.html: |
    <html><body style="background:#E6F7EE;"><h1>Stable v1.0 (50% Traffic)</h1></body></html>

---
# ── ConfigMap: Canary version HTML ───────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-app-2-canary-html
  namespace: sample-app-2
data:
  index.html: |
    <html><body style="background:#FFFBF5;"><h1>Canary v2.0 (50% Traffic)</h1></body></html>

---
# ── Stable Deployment (v1.0) ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app-2-stable
  namespace: sample-app-2
spec:
  replicas: 2     # <--- CHANGED FROM 4 TO 2
  selector:
    matchLabels:
      app: sample-app-2
      track: stable
  template:
    metadata:
      labels:
        app: sample-app-2
        track: stable
    spec:
      containers:
        - name: app
          image: nginx:1.25-alpine
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: sample-app-2-stable-html

---
# ── Canary Deployment (v2.0) ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app-2-canary
  namespace: sample-app-2
spec:
  replicas: 2     # <--- CHANGED FROM 1 TO 2
  selector:
    matchLabels:
      app: sample-app-2
      track: canary
  template:
    metadata:
      labels:
        app: sample-app-2
        track: canary
    spec:
      containers:
        - name: app
          image: nginx:1.25-alpine
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: sample-app-2-canary-html
