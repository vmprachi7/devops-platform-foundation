name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: plan
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read
  pull-requests: write   # needed to post plan as PR comment

env:
  TF_DIR:              terraform/environments/dev
  ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_ACCESS_KEY:      ${{ secrets.TF_STATE_STORAGE_KEY }}

jobs:

  # ── Runs on every PR touching terraform/** ───────────────
  # Validates syntax and posts the plan as a PR comment
  # No Azure resources are created or changed
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Format check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -no-color 2>&1 | tee plan.txt
        continue-on-error: true   # let the comment step run even if plan fails

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const plan = fs.readFileSync('${{ env.TF_DIR }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n\n...[truncated — see logs for full output]'
              : plan;
            const body = [
              '## 🏗️ Terraform Plan',
              '```hcl',
              truncated,
              '```',
              `**Result:** \`${{ steps.plan.outcome }}\``,
              `*Triggered by @${{ github.actor }} on \`${{ github.head_ref }}\`*`,
              '',
              '> ✅ Merge this PR to queue the apply — it still requires manual approval before running.',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ── Runs only on merge to main OR manual workflow_dispatch apply ──
  # Requires manual approval via GitHub Environment before running
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: production   # ← manual approval gate here

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version:  1.6.6
          terraform_wrapper:  false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Show outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Terraform outputs"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          terraform output
          echo ""
          echo "Next steps:"
          echo "  1. Run 'Platform ArgoCD' workflow to install ArgoCD"
          echo "  2. Run 'Platform Observability' workflow to install monitoring"

  # ── Manual destroy — never runs automatically ─────────────
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: production   # ← manual approval gate here too

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: ${{ env.TF_DIR }}
        run: terraform destroy -auto-approve

      - name: Confirm
        run: |
          echo "✅ Infrastructure destroyed"
          echo "State file preserved in Azure Blob — recreate anytime with apply"
