name: Platform Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'observability/**'
      - 'gitops/argocd-apps/**'
      - '.github/workflows/platform-infra.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'observability/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'What to run'
        required: true
        default: apply
        type: choice
        options:
          - apply
          - observability-only
          - argocd-only
          - destroy

permissions:
  id-token: write  # This is required for requesting the JWT
  contents: read   # This is required for actions/checkout


env:
  TF_DIR:               terraform/environments/dev
  ARM_CLIENT_ID:        ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:    ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID:        ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID:  ${{ secrets.ARM_SUBSCRIPTION_ID }}
  # Storage account key for Terraform remote state
  ARM_ACCESS_KEY:       ${{ secrets.TF_STATE_STORAGE_KEY }}
  RESOURCE_GROUP:       devops-platform-rg
  CLUSTER_NAME:         devops-platform-aks

jobs:

  # ── PR: validate + plan ──────────────────────────────────
  terraform-pr:
    name: Terraform Validate + Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init
        # ARM_ACCESS_KEY env var is set above — backend connects automatically

      - name: Format check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

      - name: Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const plan = fs.readFileSync('${{ env.TF_DIR }}/plan.txt', 'utf8');
            const body = `## 🏗️ Terraform Plan\n\`\`\`\n${plan.slice(0,60000)}\n\`\`\`\n*by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body
            });

  # ── Apply: provision AKS infra ───────────────────────────
  terraform-apply:
    name: Provision AKS Infrastructure
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version:  1.6.6
          terraform_wrapper:  false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init
        # Connects to Azure Blob backend using ARM_ACCESS_KEY

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Show outputs
        working-directory: ${{ env.TF_DIR }}
        run: terraform output

  # ── Install ArgoCD ───────────────────────────────────────
  install-argocd:
    name: Install ArgoCD + Register Apps
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: |
      always() && (
        needs.terraform-apply.result == 'success' ||
        (github.event_name == 'workflow_dispatch' &&
         contains(fromJson('["apply","argocd-only"]'), github.event.inputs.action))
      )

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}


      - uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name:   ${{ env.CLUSTER_NAME }}

      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          # Added --server-side to handle large CRDs like ApplicationSets
          kubectl apply --server-side --force-conflicts -n argocd \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=argocd-server \
            -n argocd --timeout=180s
          echo "✅ ArgoCD ready"


      - name: Login to ArgoCD + register repos + apply app CRDs
        run: |
          PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)
          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          sleep 8

          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

          argocd login localhost:8080 \
            --username admin --password "$PASS" --insecure

          # Register platform repo
          argocd repo add https://github.com/${{ github.repository }} \
            --username ${{ github.repository_owner }} \
            --password ${{ secrets.GITHUB_TOKEN }} || true

          # Apply sample app ArgoCD Application CRDs
          kubectl apply -f gitops/argocd-apps/sample-app-1.yaml
          kubectl apply -f gitops/argocd-apps/sample-app-2.yaml

          argocd app list
          echo "✅ ArgoCD apps registered"

  # ── Install Observability ────────────────────────────────
  install-observability:
    name: Install Prometheus + Grafana + Loki
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: |
      always() && (
        needs.terraform-apply.result == 'success' ||
        (github.event_name == 'workflow_dispatch' &&
         contains(fromJson('["apply","observability-only"]'), github.event.inputs.action))
      )

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name:   ${{ env.CLUSTER_NAME }}

      - name: Install metrics-server
        run: |
          kubectl apply --server-side --force-conflicts \
            -f observability/metrics-server.yaml

          echo "✅ metrics-server ready"

      - name: Add Helm repos
        run: |
          helm repo add prometheus-community \
            https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Install Prometheus + Grafana
        run: |
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install kube-prometheus-stack \
            prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --values observability/prometheus/values.yaml \
            --wait --timeout 5m
          echo "✅ Prometheus + Grafana ready"

      - name: Install Loki
        run: |
          helm upgrade --install loki grafana/loki-stack \
            --namespace monitoring \
            --values observability/loki/values.yaml \
            --wait --timeout 3m
          echo "✅ Loki ready"

      - name: Print access instructions
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Grafana: kubectl port-forward -n monitoring svc/kube-prometheus-stack-grafana 3000:80"
          echo "  Open:    http://localhost:3000   admin / admin123"
          echo "  ArgoCD:  kubectl port-forward svc/argocd-server -n argocd 8080:443"
          echo "  Open:    https://localhost:8080  admin / (argocd admin initial-password -n argocd)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ── Destroy (manual only) ────────────────────────────────
  terraform-destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'destroy'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init + Destroy
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init
          terraform destroy -auto-approve
          echo "✅ Infrastructure destroyed"
          echo "State file preserved in Azure Blob — safe to recreate"
