# ════════════════════════════════════════════════════════════
# gitops/argocd-apps/sample-app-2.yaml
# ArgoCD watches apps/sample-app-2/ in THIS repo
# ════════════════════════════════════════════════════════════
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app-2
  namespace: argocd
  labels:
    project:  devops-platform
    demo:     canary-deployment
    repo:     devops-platform-foundation
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL:        https://github.com/YOUR_USERNAME/devops-platform-foundation
    targetRevision: main
    path:           apps/sample-app-2
  destination:
    server:    https://kubernetes.default.svc
    namespace: sample-app-2
  syncPolicy:
    automated:
      prune:    true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration:    5s
        factor:      2
        maxDuration: 1m
